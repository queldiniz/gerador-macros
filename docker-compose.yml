services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nutrase-backend
    env_file:
      - .env
    ports:
      - "5000:5000"
    volumes:
      - sqlite-data:/app/instance
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/doc')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  sqlite-data:
